<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Time Clock Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <h1>Time Clock WebSocket Test</h1>

  <div>
    <label>JWT Token:</label>
    <input type="text" id="token" size="80" placeholder="Enter your JWT token here">
  </div>

  <div>
    <label>Server URL:</label>
    <input type="text" id="serverUrl" size="50" value="http://localhost:3000">
  </div>

  <button onclick="connectSocket()">Connect</button>
  <button onclick="sendLocation()">Send Location</button>

  <pre id="log"></pre>

  <script>
    let socket;

    function log(message) {
      const logBox = document.getElementById('log');
      logBox.textContent += message + '\n';
      logBox.scrollTop = logBox.scrollHeight;
    }

    function connectSocket() {
      const token = document.getElementById('token').value;
      const serverUrl = document.getElementById('serverUrl').value;

      if (!token) {
        alert("Please enter a JWT token first");
        return;
      }

      socket = io(`${serverUrl}/js/clock`, {
        auth: { token: `Bearer ${token}` },
      });

      socket.on("connect", () => {
        log("✅ Connected to server");
      });

      socket.on("disconnect", (reason) => {
        log("❌ Disconnected: " + reason);
      });

      socket.on("connect_error", (err) => {
        log("⚠️ Connection error: " + err.message);
      });

      socket.on("clock-status", (data) => {
        log("📩 Clock status received: " + JSON.stringify(data, null, 2));
      });
    }

    function sendLocation() {
      if (!socket || !socket.connected) {
        log("⚠️ Not connected to server");
        return;
      }

      // Example: random location (replace with real coords if needed)
      const lat = 23.8103 + Math.random() * 0.01;
      const lng = 90.4125 + Math.random() * 0.01;

      log(`📤 Sending location: lat=${lat}, lng=${lng}`);
      socket.emit("location-update", { lat, lng });
    }
  </script>
</body>
</html>
