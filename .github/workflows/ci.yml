name: CI-DB-CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - '**'

jobs:
  ci:
    name: 🧪 CI - Lint, Build, Format, Prisma 
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧹 Run Lint
        run: npm lint

      - name: ✅ Format Check
        run: npm format

      - name: 🏗 Build Project
        run: npm build

      # - name: 🔍 Prisma Schema Validation
