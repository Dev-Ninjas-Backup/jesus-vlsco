services:
  server:
    image: arafat2025/jesusu-server:latest
    platform: linux/amd64
    container_name: jesus-server-api
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - 5005:5005
    depends_on:
      - db
      - redis
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npm run start:prod
      "

  db:
    image: postgres:16
    container_name: jesus_db
    restart: always
    # user: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jesus_db
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5400:5432'

  redis:
    image: redis
    container_name: jesus_redis
    restart: always
    ports:
      - '6382:6379'

volumes:
  db-data:
